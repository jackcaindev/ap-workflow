services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: freight_ap_integration
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1::5432"
    volumes:
      - postgres_integration_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freight_ap_integration"]
      interval: 1s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "always"]
    ports:
      - "127.0.0.1::6379"
    volumes:
      - redis_integration_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

volumes:
  postgres_integration_data:
  redis_integration_data:
