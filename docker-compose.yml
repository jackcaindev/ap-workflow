services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Docker Compose service names resolve as DNS names on the default network,
      # so the API should connect to "db" and "redis" instead of localhost.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/freight_ap
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/freight_ap_test
      REDIS_URL: redis://redis:6379/0
      # The value is read from the host/.env file by Compose and passed through
      # to the API container without baking secrets into the image.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GMAIL_CREDENTIALS_PATH: ${GMAIL_CREDENTIALS_PATH:-/app/credentials.json}
      GMAIL_TOKEN_PATH: ${GMAIL_TOKEN_PATH:-/app/token.json}
      MISSING_DOCUMENT_SLA_HOURS: ${MISSING_DOCUMENT_SLA_HOURS:-72}
      MISSING_DOCUMENT_SCAN_INTERVAL_SECONDS: ${MISSING_DOCUMENT_SCAN_INTERVAL_SECONDS:-300}
    ports:
      - '8000:8000'
    volumes:
      # Gmail OAuth files must be mounted into the API container because the
      # Gmail service reads them from settings.GMAIL_CREDENTIALS_PATH and
      # settings.GMAIL_TOKEN_PATH at runtime.
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: freight_ap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      # A named volume keeps local development data across container restarts.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d freight_ap']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes', '--appendfsync', 'always']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
