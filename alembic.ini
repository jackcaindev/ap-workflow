[alembic]
script_location = alembic
prepend_sys_path = .

# env.py reads DATABASE_URL first. The default here points at the Compose
# PostgreSQL service so migrations run correctly from inside the API container.
# For host-based local runs, set DATABASE_URL to a localhost DSN.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@db:5432/freight_ap

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
